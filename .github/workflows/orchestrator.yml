name: QC Orchestrator

on:
  issues:
    types: [opened]

jobs:
  orchestrate:
    if: contains(github.event.issue.labels.*.name, 'orchestrator-run')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch to Copilot (Opus 4.6)
        env:
          GH_TOKEN: ${{ secrets.QC_ORCHESTRATOR_PAT }}
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          jq -n \
            --rawfile prompt .github/workflows/orchestrator-prompt.md \
            --arg issue "$ISSUE_NUM" \
            '{
              title: ("QC Orchestrator Session — from #" + $issue),
              body: ($prompt + "\n\nYou are starting a new QC orchestrator cycle. The triggering issue is #" + $issue + ".\nPost your opening comment on that issue, then follow your startup checklist."),
              labels: ["agent-task"],
              assignees: ["copilot-swe-agent[bot]"],
              agent_assignment: {
                target_repo: "EvaLok/schema-org-json-ld-qc",
                base_branch: "master",
                model: "claude-opus-4-6",
                custom_instructions: ""
              }
            }' | gh api /repos/EvaLok/schema-org-json-ld-qc/issues --method POST --input -

