name: QC Orchestrator

on:
  issues:
    types: [opened]

jobs:
  orchestrate:
    if: contains(github.event.issue.labels.*.name, 'orchestrator-run')
    runs-on: ubuntu-latest
    timeout-minutes: 75
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.QC_ORCHESTRATOR_PAT }}
          fetch-depth: 0

      - name: Load system prompt
        id: prompt
        run: |
          {
            echo "content<<PROMPT_EOF"
            cat .github/workflows/orchestrator-prompt.md
            echo "PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run QC Orchestrator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.QC_ORCHESTRATOR_PAT }}
          claude_args: |
            --model claude-opus-4-6
          prompt: |
            ${{ steps.prompt.outputs.content }}

            You are starting a new QC orchestrator cycle. The triggering issue is #${{ github.event.issue.number }}.
            Post your opening comment on that issue, then follow your startup checklist.
          settings: |
            {
              "permissions": {
                "allow": [
                  "Edit",
                  "Write",
                  "Bash(gh *)",
                  "Bash(git *)",
                  "Bash(jq *)",
                  "Bash(composer *)",
                  "Bash(npm *)",
                  "Bash(npx *)",
                  "Bash(node *)",
                  "Bash(php *)",
                  "Bash(mkdir *)",
                  "Bash(ls *)",
                  "Bash(date *)",
                  "Bash(wc *)",
                  "Bash(sort *)",
                  "WebFetch(domain:search.google.com)",
                  "WebFetch(domain:developers.google.com)",
                  "WebFetch(domain:schema.org)"
                ]
              }
            }
