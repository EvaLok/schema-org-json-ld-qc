steps:
  - uses: actions/checkout@v4
  - uses: shivammathur/setup-php@v2
    with:
      php-version: '8.3'
      tools: composer:v2
  - run: composer install --no-interaction --prefer-dist
  - uses: actions/setup-node@v4
    with:
      node-version: '20'
  - run: npm ci
  - run: npx playwright install --with-deps chromium
